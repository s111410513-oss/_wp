<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads - 社群平台</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #0095f6;
            --accent-hover: #0081d6;
            --border: #333333;
            --danger: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            min-height: 100vh;
        }
        .layout { display: flex; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 250px;
            padding: 20px;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
        }
        .logo { font-size: 28px; font-weight: 700; margin-bottom: 30px; color: var(--text-primary); }
        .nav-item { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-item:hover, .nav-item.active { background: var(--bg-tertiary); }
        .nav-item svg { width: 24px; height: 24px; margin-right: 15px; }
        
        /* Main Content */
        .main { 
            flex: 1; 
            margin-left: 250px; 
            padding: 20px 40px; 
            max-width: 900px;
        }
        .section-title { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        /* Post Card */
        .post-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .post-header { display: flex; align-items: center; margin-bottom: 15px; }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            margin-right: 12px;
        }
        .post-info h3 { font-size: 15px; font-weight: 600; }
        .post-info span { font-size: 13px; color: var(--text-secondary); }
        .post-content { 
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .post-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .post-actions { display: flex; gap: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .action-btn { 
            background: none; 
            border: none; 
            color: var(--text-secondary); 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .action-btn:hover { color: var(--text-primary); }
        
        /* Create Post */
        .create-post {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .create-post textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            min-height: 100px;
            margin-bottom: 15px;
        }
        .create-post textarea:focus { outline: none; }
        .create-post input {
            width: 100%;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 15px;
        }
        .create-post input:focus { outline: none; }
        .post-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            float: right;
        }
        .post-btn:hover { background: var(--accent-hover); }
        
        /* Users Grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .user-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }
        .user-card:hover { transform: translateY(-3px); }
        .user-card .avatar {
            width: 60px;
            height: 60px;
            margin: 0 auto 12px;
            font-size: 24px;
        }
        .user-card h4 { font-size: 16px; margin-bottom: 5px; }
        .user-card span { font-size: 13px; color: var(--text-secondary); }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            border: 1px solid var(--border);
        }
        .modal-content h2 { text-align: center; margin-bottom: 25px; }
        .modal-content input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 15px;
        }
        .modal-content input:focus { outline: none; border-color: var(--accent); }
        .modal-content .btn-group { display: flex; gap: 10px; }
        .modal-content button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-submit { background: var(--accent); color: white; }
        .btn-cancel { background: var(--bg-tertiary); color: var(--text-primary); }
        
        /* Auth Bar */
        .auth-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .auth-section h3 { margin-bottom: 15px; }
        .auth-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .auth-bar button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login { background: var(--accent); color: white; }
        .btn-register { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-logout { background: var(--danger); color: white; }
        .user-info { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .error { color: var(--danger); font-size: 14px; margin-bottom: 10px; display: none; text-align: center; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 15px; }
            .layout { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">Threads</div>
            <a class="nav-item active" onclick="showSection('all')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                所有貼文
            </a>
            <a class="nav-item" onclick="showSection('personal')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                我的貼文
            </a>
            <a class="nav-item" onclick="showSection('users')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                使用者
            </a>
        </div>
        
        <div class="main">
            <div id="authSection" class="auth-section">
                <div class="user-info">
                    <h3 id="welcomeMsg"></h3>
                    <div class="auth-bar" id="authButtons">
                        <button class="btn-login" onclick="showModal('login')">登入</button>
                        <button class="btn-register" onclick="showModal('register')">註冊</button>
                    </div>
                </div>
            </div>
            
            <div id="createPostSection" style="display: none;">
                <h2 class="section-title">發表貼文</h2>
                <div class="create-post">
                    <input type="text" id="postTitle" placeholder="標題">
                    <textarea id="postContent" placeholder="分享你的想法..."></textarea>
                    <button class="post-btn" onclick="createPost()">發布</button>
                </div>
            </div>
            
            <div id="allPostsSection">
                <h2 class="section-title">所有貼文</h2>
                <div id="allPosts"></div>
            </div>
            
            <div id="personalPostsSection" style="display: none;">
                <h2 class="section-title">我的貼文</h2>
                <div id="personalPosts"></div>
            </div>
            
            <div id="usersSection" style="display: none;">
                <h2 class="section-title">探索使用者</h2>
                <div class="users-grid" id="usersGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">登入</h2>
            <p class="error" id="errorMsg"></p>
            <input type="text" id="username" placeholder="帳號">
            <input type="password" id="password" placeholder="密碼">
            <div class="btn-group">
                <button class="btn-submit" onclick="submitAuth()">確認</button>
                <button class="btn-cancel" onclick="hideModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentSection = 'all';
        let authMode = 'login';
        
        function getAvatarColor(username) {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'];
            let hash = 0;
            for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
        
        function getInitial(username) {
            return username ? username.charAt(0).toUpperCase() : '?';
        }

        function showModal(mode) {
            authMode = mode;
            document.getElementById('modalTitle').textContent = mode === 'login' ? '登入' : '註冊';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('authModal').classList.add('show');
        }

        function hideModal() {
            document.getElementById('authModal').classList.remove('show');
        }

        async function submitAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            const res = await fetch(`/api/${authMode}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (!res.ok) {
                errorMsg.textContent = data.error;
                errorMsg.style.display = 'block';
                return;
            }

            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            hideModal();
            updateUI();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('user');
            updateUI();
        }

        function updateUI() {
            const authSection = document.getElementById('authSection');
            const createPostSection = document.getElementById('createPostSection');
            const welcomeMsg = document.getElementById('welcomeMsg');
            const authButtons = document.getElementById('authButtons');
            
            if (currentUser) {
                welcomeMsg.textContent = `歡迎回來，${currentUser.username}`;
                authButtons.innerHTML = '<button class="btn-logout" onclick="logout()">登出</button>';
                createPostSection.style.display = 'block';
            } else {
                welcomeMsg.textContent = '登入以發表貼文';
                authButtons.innerHTML = '<button class="btn-login" onclick="showModal(\'login\')">登入</button><button class="btn-register" onclick="showModal(\'register\')">註冊</button>';
                createPostSection.style.display = 'none';
            }
            
            loadPosts();
            loadUsers();
        }

        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            renderAllPosts(posts);
            if (currentUser) {
                const userRes = await fetch(`/api/posts/user/${currentUser.username}`);
                const userPosts = await userRes.json();
                renderPersonalPosts(userPosts);
            }
        }

        function renderAllPosts(posts) {
            const container = document.getElementById('allPosts');
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">還沒有任何貼文</p>';
                return;
            }
            container.innerHTML = posts.reverse().map(post => createPostCard(post)).join('');
        }

        function renderPersonalPosts(posts) {
            const container = document.getElementById('personalPosts');
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">你還沒發表任何貼文</p>';
                return;
            }
            container.innerHTML = posts.reverse().map(post => createPostCard(post, true)).join('');
        }

        function createPostCard(post, isOwner = false) {
            const avatarColor = getAvatarColor(post.author);
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar" style="background: ${avatarColor}">${getInitial(post.author)}</div>
                        <div class="post-info">
                            <h3>${escapeHtml(post.author)}</h3>
                            <span>${new Date(post.createdAt).toLocaleString()}</span>
                        </div>
                    </div>
                    ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${isOwner ? `
                    <div class="post-actions">
                        <button class="action-btn" onclick="deletePost(${post.id})">🗑️ 刪除</button>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const grid = document.getElementById('usersGrid');
            grid.innerHTML = users.map(user => `
                <div class="user-card" onclick="viewUserPosts('${user.username}')">
                    <div class="avatar" style="background: ${getAvatarColor(user.username)}">${getInitial(user.username)}</div>
                    <h4>${escapeHtml(user.username)}</h4>
                    <span>查看貼文</span>
                </div>
            `).join('');
        }

        async function viewUserPosts(username) {
            const res = await fetch(`/api/posts/user/${username}`);
            const posts = await res.json();
            currentSection = 'userPosts';
            document.getElementById('allPostsSection').style.display = 'block';
            document.getElementById('allPostsSection').querySelector('.section-title').textContent = `${username} 的貼文`;
            document.getElementById('personalPostsSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            renderAllPosts(posts);
        }

        function showSection(section) {
            currentSection = section;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            document.getElementById('allPostsSection').style.display = 'none';
            document.getElementById('personalPostsSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            
            if (section === 'all') {
                document.getElementById('allPostsSection').style.display = 'block';
                document.getElementById('allPostsSection').querySelector('.section-title').textContent = '所有貼文';
                loadPosts();
            } else if (section === 'personal') {
                if (!currentUser) {
                    alert('請先登入');
                    showModal('login');
                    return;
                }
                document.getElementById('personalPostsSection').style.display = 'block';
            } else if (section === 'users') {
                document.getElementById('usersSection').style.display = 'block';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function createPost() {
            if (!currentUser) return alert('請先登入');
            
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if (!content) return alert('請輸入內容');

            await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, author: currentUser.username })
            });

            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            loadPosts();
        }

        async function deletePost(id) {
            if (!confirm('確定要刪除這篇貼文嗎？')) return;
            await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            loadPosts();
        }

        const savedUser = localStorage.getItem('user');
        if (savedUser) currentUser = JSON.parse(savedUser);
        updateUI();
    </script>
</body>
</html>
